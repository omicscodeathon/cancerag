# Configuration for the GPCR Signaling Bias Prediction Pipeline

paths:
  raw_data: 'data/raw'
  chembl_raw: 'data/raw/chembl' # Directory for raw ChEMBL downloads
  processed_data: 'data/processed'
  interim_data: 'data/interim'
  models: 'results/models'
  figures: 'results/figures'
  reports: 'results/reports'
  biasdb_input: 'data/raw/biasdb_data.csv'
  pdb_summary: 'data/pdb' # Directory to save PDB files and summary

data_collection:
  max_pdb_files_per_receptor: 10
  # ChEMBL parameters for fetching unbiased agonists
  enable_chembl: true # Set to false to skip ChEMBL collection
  chembl_activity_types: [ 'EC50', 'IC50', 'Ki' ]
  chembl_max_agonists_per_receptor: 500
  chembl_min_confidence_score: 8
  chembl_activity_threshold_nm: 1000

preprocessing:
  activity_threshold_nm: 1000
  lipinski_strict: false
  tpsa_max: 140
  rotatable_bonds_max: 10

docking:
  # Vina parameters — Stage 05 fix.
  # Defaults raised back to publication-grade settings:
  #   exhaustiveness >= 16 is the literature recommendation for pose RMSD
  #   reliability; the previous value of 4 was set "for faster execution"
  #   and produced unreliable poses (Reviewer 1 point 4).
  vina_version: "1.2.5"
  exhaustiveness: 16
  num_modes: 9
  energy_range: 4
  num_cpu: 4
  per_job_timeout_seconds: 600
  ph_for_protonation: 7.4
  redock_rmsd_threshold_angstrom: 2.5

  # Binding site definition (can be overridden per receptor)
  default_binding_site:
    size_x: 25.0
    size_y: 25.0
    size_z: 25.0

network:
  # null => retry indefinitely until success
  max_retries: null
  base_backoff_seconds: 3
  max_backoff_seconds: 90
  session_retries: 5

ml_model:
  # Stage 08 fix: raised from 0.05 (which produced a 26-row test set on a
  # 5-class problem with 15:1 imbalance — Reviewer 2 explicitly demanded
  # >=0.20 or nested CV).
  test_size: 0.20
  random_state: 42
  # Parameters for RandomForest or GradientBoosting
  n_estimators: 100
  max_depth: 10
  # Split strategy: "scaffold" (Murcko) is primary; "receptor_grouped" is the
  # second regime reported alongside.
  split_strategy: "scaffold"
  also_report_split: "receptor_grouped"
  # Reproducibility under small-n: report mean +/- std across multiple seeds.
  random_seeds: [42, 7, 1234, 99, 2024]
  outer_cv_folds: 5
  inner_cv_folds: 5
  bootstrap_ci_n: 1000
  applicability_domain_tanimoto: 0.4
