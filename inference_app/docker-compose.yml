version: '3.8'

services:
  inference-app:
    build:
      context: ..
      dockerfile: inference_app/Dockerfile
    container_name: cancerag-inference
    ports:
      - "7860:7860"
    volumes:
      # Mount model files and preprocessing artifacts
      - ../results/models:/app/results/models:ro
      - ../data/processed/ml_preprocessed:/app/data/processed/ml_preprocessed:ro
      # Mount receptor structures if available
      - ../data/processed/receptors:/app/data/processed/receptors:ro
      # Mount logs directory for persistence
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:7860')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

