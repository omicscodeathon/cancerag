[pytest]
# Pytest configuration for CancerAg project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Resolve `src` layout without requiring an editable install
pythonpath = src

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests for individual functions/classes
    integration: Integration tests for components
    validation: Data validation tests
    slow: Tests that take a long time to run
    api: Tests that require external API calls
    docking: Tests that require docking tools (Vina, OpenBabel)

# Coverage options (when using pytest-cov)
# Coverage threshold
# --cov-fail-under=70

# Min Python version
minversion = 7.0

# Warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning

# Timeout for tests (require pytest-timeout)
timeout = 300

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

